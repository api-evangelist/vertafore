  endpointsModeled: true
  properties:
  - url: https://help.vertafore.com/devportal/content/getstarted/gettingstarted.htm
    type: Documentation
  description: >-
    An OData connection method for AMS360 used to automatically retrieve customer,
    policy, and accounting data for reporting and downstream integrations. Access
    requires an AMS360 OData subscription contracted through Vertafore. The queryable
