name: Vertafore
kind: company
description: >-
  Vertafore is an insurance technology provider whose software runs a large share
  of the North American property and casualty distribution channel - agency
  management systems (AMS360 and Sagitta), the ImageRight document and content
  management platform, and the PL Rating personal-lines comparative rater.
  Vertafore exposes developer APIs across these products through the Vertafore API
  Developer Portal (developer.vertafore.com) and the Orange Partner Program. Access
  is partner-gated - it requires a Vertafore Single Sign-On (VSSO) account, a
  licensed Vertafore Developer Portal contract, and per-API scopes that the agency
  has contracted for, with applications promoted from a Sandbox to Live only after
  Vertafore approval. Because the reference documentation and OpenAPI live behind
  that login, the endpoints listed here are honestly modeled from public help
  content and product pages rather than pulled from an open specification.
