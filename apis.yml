    resources here are modeled rather than sourced from an open metadata document.
- aid: vertafore:vertafore-imageright-rest-api
  name: Vertafore ImageRight REST API
  tags:
  - ImageRight
  - Documents
  - Content Management
  - REST
  - Partner Gated
  image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
  humanURL: https://developer.vertafore.com/
  baseURL: https://api.vertafore.com
  endpointsModeled: true
  properties:
  - url: http://support2.vertafore.com/Repository/Documentation/DWN311/ImageRight6.8RestAPI.pdf
    type: Documentation
  description: >-
    A REST API over ImageRight, Vertafore's document and content management platform
    for carriers and larger agencies. It covers document ingestion and retrieval,
    files and folders, tasks, and workflow objects, authenticated with a token
    obtained from ImageRight credentials. A public ImageRight 6.8 REST API reference
    PDF documents the authentication flow, status and error codes, and resource
    model; live base URLs are deployment-specific, so endpoints here are modeled.
- aid: vertafore:vertafore-pl-rating-api
  name: Vertafore PL Rating API
  tags:
  - PL Rating
  - Comparative Rating
  - Personal Lines
  - Quoting
  - Partner Gated
  image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
  humanURL: https://www.vertafore.com/products/insurance-comparative-rater/pl-rating
  baseURL: https://api.vertafore.com
  endpointsModeled: true
  properties:
  - url: https://www.vertafore.com/products/insurance-comparative-rater/pl-rating
    type: Documentation
  - url: https://help.vertafore.com/ams360/content/contextsensitive/download-integration/gsplrating-anoverview.htm
    type: APIReference
  description: >-
    A rating and quoting API surface over PL Rating, Vertafore's personal-lines
    comparative rater connected to more than 300 carriers across 48 states and DC.
    It supports single-entry rate requests, real-time carrier quote retrieval, and
    the newer in-rater bind capability. Vertafore's portal documentation refers to
    a forthcoming Vertafore Rating API secured with API credential keys; the request
    and response contracts are partner-gated, so endpoints here are modeled.
