apis:
- aid: vertafore:vertafore-ams360-ems-api
  name: Vertafore AMS360 EMS API
  tags:
  - AMS360
  - REST
  - Customers
  - Policies
  - Partner Gated
  image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
  humanURL: https://developer.vertafore.com/
  baseURL: https://api.vertafore.com
  endpointsModeled: true
  properties:
  - url: https://help.vertafore.com/devportal/content/getstarted/gettingstarted.htm
    type: Documentation
  - url: https://help.vertafore.com/devportal/content/howto/tutorial1_headerconnection.htm
    type: APIReference
  description: >-
    The newest and preferred REST API for AMS360, the flagship property and
    casualty agency management system. It exposes agency data as REST resources -
    Customers, Policies, Service Agreements, Invoices, Billing, Deposits, and
    Personnel - secured with OAuth Bearer tokens. Public tutorials show the sandbox
    base host api-sandbox.vertafore.com and a Customers endpoint under
    /authgrant/v1/api; the full resource surface is documented behind the gated
    Developer Portal, so endpoints here are modeled rather than harvested.
- aid: vertafore:vertafore-ams360-wsapi
  name: Vertafore AMS360 WSAPI
  tags:
  - AMS360
  - SOAP
  - Web Service
  - Partner Gated
  image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
  humanURL: https://help.vertafore.com/ams360/content/contextsensitive/download-integration/cswebserviceapisetup.htm
  baseURL: https://ws.ams360.com
  endpointsModeled: true
  properties:
  - url: https://help.vertafore.com/ams360/content/contextsensitive/download-integration/cswebserviceapisetup.htm
    type: Documentation
  description: >-
    The established SOAP web service for AMS360 (versions 2.4 and 3.0), exposed as
    WSAPIService.svc and authenticated with a per-agency username and password. It
    lets third-party applications send, receive, and update data directly against
    the AMS360 database while preserving AMS360 security. Public references name
    operations such as CustomerGet, PolicyGet, and SearchByPhoneNumber under a
    /v3/WSAPIService.svc path. The WSDL is partner-gated, so operations here are
    modeled from public help content.
- aid: vertafore:vertafore-ams360-odata-api
  name: Vertafore AMS360 OData API
  tags:
  - AMS360
  - OData
  - Reporting
  - Partner Gated
  image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
  humanURL: https://help.vertafore.com/ams360/content/contextsensitive/download-integration/gsplrating-anoverview.htm
